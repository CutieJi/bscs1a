<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - MISLend</title>
    <link rel="stylesheet" href="assets/css/login-ui.css" />
</head>

<body>
    <main class="auth-shell">
        <section class="auth-left">
            <div class="brand">
                <img src="assets/images/13.png" alt="MISLend" class="brand-logo">
                <span>MIS<span style="color: #c8921a;">Lend</span></span>
            </div>

            <div class="slide-show">
                <div class="slide-track">
                    <div class="slide active" style="background-image: url('assets/images/login-img.png');">
                    </div>
                    <div class="slide" style="background-image: url('assets/images/login-img2.png');">
                    </div>
                    <div class="slide" style="background-image: url('assets/images/login-img3.png');">
                    </div>
                </div>
                <div class="slide-overlay"></div>
            </div>

            <div class="slide-content">
                <h1>Borrow Smarter with MIS<span style="color: #c8921a;">Lend</span></h1>
                <p>
                    Manage projectors, laptops, HDMI cables, TV displays, and other MIS office equipment
                    in a faster and more organized way.
                </p>

                <div class="slide-dots">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>
        </section>

        <section class="auth-right">
            <div class="auth-card login-card">
                <h2>UCC - MIS | <span style="color: #c8921a;">Sign in</span></h2>
                <p class="auth-desc">Sign in to your account</p>

                <form id="unifiedLoginForm" class="auth-form">
                    <div id="loginAlert" class="form-alert d-none"></div>

                    <div class="field">
                        <label for="loginEmail">Your Email / Student ID</label>
                        <input type="text" id="loginEmail" placeholder="Enter your email/student id" required />
                    </div>

                    <div class="field">
                        <label for="loginPassword">Password</label>
                        <div class="password-field">
                            <input type="password" id="loginPassword" placeholder="Enter your password" required />
                            <button type="button" class="toggle-password" id="togglePassword">Show</button>
                        </div>
                    </div>

                    <div class="form-row">
                        <label class="remember-wrap">
                            <input type="checkbox" />
                            <span>Remember Me</span>
                        </label>

                        <a href="#" class="text-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="main-btn"><span>Sign In</span></button>

                    <p class="bottom-text">
                        Don't have an account?
                        <a href="register.html">Register</a>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth-slider.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        // Toggle password visibility
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('loginPassword');
        if (toggleBtn && passwordInput) {
            toggleBtn.addEventListener('click', () => {
                const isHidden = passwordInput.type === 'password';
                passwordInput.type = isHidden ? 'text' : 'password';
                toggleBtn.textContent = isHidden ? 'Hide' : 'Show';
            });
        }
    </script>
</body>

</html>
