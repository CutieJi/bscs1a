<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - MISLend</title>
    <link rel="stylesheet" href="assets/css/login-ui.css" />
</head>

<body>
    <main class="auth-shell register-shell">
        <section class="auth-left">
            <div class="brand">
                <img src="assets/images/13.png" alt="MISLend" class="brand-logo">
                <span>MIS<span style="color: #c8921a;">Lend</span></span>
            </div>

            <div class="slide-show">
                <div class="slide-track">
                    <div class="slide active" style="background-image: url('assets/images/login-img.png');">
                    </div>
                    <div class="slide" style="background-image: url('assets/images/login-img2.png');">
                    </div>
                    <div class="slide" style="background-image: url('assets/images/login-img3.png');">
                    </div>
                </div>
                <div class="slide-overlay"></div>
            </div>

            <div class="slide-content">
                <h1>Create Your MIS<span style="color: #c8921a;">Lend</span> Account</h1>
                <p>
                    Register your student account to access borrowing, returning, history tracking,
                    and equipment requests with admin approval.
                </p>

                <div class="slide-dots">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>
        </section>

        <section class="auth-right">
            <div class="auth-card register-card compact-register">
                <h2>UCC - MIS | <span style="color: #c8921a;">Registration</span></h2>
                <p class="auth-desc">Fill in your student details</p>

                <form id="unifiedRegisterForm" class="auth-form">
                    <div id="registerAlert" class="form-alert d-none"></div>

                    <div class="register-grid compact-grid">
                        <!-- Row 1: First Name | Middle Initial | Last Name -->
                        <div class="field col-first">
                            <label for="registerFirstName">First Name</label>
                            <input type="text" id="registerFirstName" placeholder="First Name" required />
                        </div>

                        <div class="field col-mi">
                            <label for="registerMiddleInitial">Middle Initial</label>
                            <input type="text" id="registerMiddleInitial" placeholder="M.I." maxlength="2" />
                        </div>

                        <div class="field col-last">
                            <label for="registerLastName">Last Name</label>
                            <input type="text" id="registerLastName" placeholder="Last Name" required />
                        </div>

                        <!-- Row 2: Student ID | Mobile Number -->
                        <div class="field">
                            <label for="registerStudentId">Student ID</label>
                            <input type="text" id="registerStudentId" placeholder="Student ID" maxlength="10" required />
                        </div>

                        <div class="field">
                            <label for="registerMobile">Mobile Number</label>
                            <input type="text" id="registerMobile" placeholder="Mobile Number" maxlength="11" required />
                        </div>

                        <!-- Row 3: Course | (spacer handled by grid) -->
                        <div class="field full">
                            <label for="registerCourse">Course</label>
                            <input type="text" id="registerCourse" placeholder="e.g. BSCS, BSIT" required />
                        </div>

                        <!-- Row 4: Email Address (full width) -->
                        <div class="field full">
                            <label for="registerEmail">Email Address</label>
                            <input type="email" id="registerEmail" placeholder="Email Address" required />
                        </div>

                        <!-- Row 5: Password (full width) -->
                        <div class="field full">
                            <label for="registerPassword">Password</label>
                            <div class="password-field">
                                <input type="password" id="registerPassword" placeholder="Enter your password (min 6 chars)" required />
                                <button type="button" class="toggle-password" id="toggleRegPassword">Show</button>
                            </div>
                        </div>

                        <!-- Row 6: Year Level | Section -->
                        <div class="field">
                            <label for="registerYearLevel">Year Level</label>
                            <select id="registerYearLevel" required>
                                <option value="">Select Year</option>
                                <option value="1">1st Year</option>
                                <option value="2">2nd Year</option>
                                <option value="3">3rd Year</option>
                                <option value="4">4th Year</option>
                            </select>
                        </div>

                        <div class="field">
                            <label for="registerSection">Section</label>
                            <select id="registerSection" required>
                                <option value="">Select Section</option>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="main-btn compact-btn"><span>Create Account</span></button>

                    <p class="bottom-text compact-bottom">
                        Already have an account?
                        <a href="login.html">Login</a>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth-slider.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        // Toggle password visibility
        const toggleRegBtn = document.getElementById('toggleRegPassword');
        const regPasswordInput = document.getElementById('registerPassword');
        if (toggleRegBtn && regPasswordInput) {
            toggleRegBtn.addEventListener('click', () => {
                const isHidden = regPasswordInput.type === 'password';
                regPasswordInput.type = isHidden ? 'text' : 'password';
                toggleRegBtn.textContent = isHidden ? 'Hide' : 'Show';
            });
        }
    </script>
</body>

</html>
